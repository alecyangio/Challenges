<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="index.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="main-img">

      <img src="/nft-preview-card-component-main/images/image-equilibrium.jpg">

    </div>

    <div class="content">

      <div class="nft-title">

        <h2>Equilibrium #3429</h2>

      </div>

      <div class="nft-info">

        <p>Our Equilibrium collection promotes balance and calm.</p>

      </div>

      <div class="price-date">

        <div class="price">
          <img src="/nft-preview-card-component-main/images/icon-ethereum.svg">
          <p>0.041 ETH</p>
        </div>

        <div class="days-left">
          <img src="/nft-preview-card-component-main/images/icon-clock.svg">
          <p>3 days left</p>
        </div>


      </div>
      </p>
    </div>

    <hr>

    <div class="auth">
      <img src="/nft-preview-card-component-main/images/image-avatar.png" alt="">
    <p>Creation of <span class="author">Jules Wyvern</span></p>
    </div>

  </div>

  </div>

  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>

</html>
